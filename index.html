<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계시록 시험</title>
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      background-color: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      min-height: 100vh;
      margin: 0;
      box-sizing: border-box;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 700px;
      position: relative;
    }
    h2 { text-align: center; color: #333; margin-bottom: 25px; }
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .input-group input, .input-group select {
      width: 100%; padding: 10px; border: 1px solid #ccc;
      border-radius: 5px; box-sizing: border-box; font-size: 15px;
    }
    button {
      width: 100%; padding: 12px; background-color: #4CAF50;
      color: white; border: none; border-radius: 5px; font-size: 16px;
      cursor: pointer; margin-top: 10px; font-weight: bold; transition: 0.2s;
    }
    button:hover { background-color: #45a049; }
    .btn-secondary { background-color: #757575; }
    .btn-secondary:hover { background-color: #616161; }
    
    .blank-input {
      width: 100px; border: none; border-bottom: 2px solid #e91e63;
      text-align: center; outline: none; font-size: 16px;
      background-color: #fce4ec; color: #333; font-weight: bold;
      margin: 0 5px; padding: 2px 5px; border-radius: 3px 3px 0 0;
    }
    textarea {
      width: 100%; padding: 10px; border: 1px solid #ccc;
      border-radius: 5px; resize: vertical; box-sizing: border-box;
      font-size: 15px; min-height: 80px; font-family: 'Malgun Gothic', sans-serif;
    }
    .question-box {
      background-color: #f9f9f9; padding: 15px; margin-bottom: 20px;
      border-left: 4px solid #4CAF50; border-radius: 5px; line-height: 1.8;
    }
    .question-title { font-size: 16px; font-weight: bold; color: #2e7d32; margin-bottom: 10px; }
    
    /* 관리자 탭 스타일 */
    .admin-tabs { display: flex; border-bottom: 2px solid #4CAF50; margin-bottom: 20px; }
    .admin-tab {
      padding: 10px 20px; cursor: pointer; background: #f2f2f2;
      border-radius: 5px 5px 0 0; margin-right: 5px;
    }
    .admin-tab.active { background: #4CAF50; color: white; font-weight: bold; }
    .settings-group {
      background: #fafafa; padding: 15px; border-radius: 5px;
      margin-bottom: 15px; border: 1px solid #eee;
    }
    
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
    th { background-color: #f2f2f2; }
    
    .hidden { display: none !important; }
    .admin-trigger {
      position: absolute; bottom: -40px; right: 0;
      width: 30px; height: 30px; background: transparent; border: none; cursor: pointer;
    }

    /* 수동 빈칸 툴 스타일 */
    #verse-preview {
      padding: 15px; background: white; border: 1px solid #ccc;
      border-radius: 5px; min-height: 100px; font-size: 16px; line-height: 1.8;
      margin-bottom: 10px;
    }
    mark { background-color: #ffeb3b; font-weight: bold; padding: 0 4px; border-radius: 3px; }
    
    /* 결과창 정답 오답 스타일 */
    .correct-field { background-color: #e8f5e9 !important; border-color: #4CAF50 !important; color: #2e7d32 !important; }
    .wrong-field { background-color: #ffebee !important; border-color: #e91e63 !important; color: #c62828 !important; }
    .correct-label { color: #e91e63; font-size: 13px; font-weight: bold; margin-left: 8px; background: #fce4ec; padding: 2px 6px; border-radius: 4px;}
  </style>
</head>
<body>

<div class="container">
  
  <!-- 0. 로딩 화면 -->
  <div id="loading-screen">
    <h2 style="text-align:center; padding: 40px 0; color: #666;">데이터를 불러오는 중입니다...</h2>
  </div>

  <!-- 0. 마감 메시지 화면 -->
  <div id="closed-screen" class="hidden">
    <h2 style="color: #d32f2f; padding: 40px 0;">지금은 시험응시 시간이 아닙니다.</h2>
  </div>

  <!-- 1. 로그인 화면 -->
  <div id="login-screen" class="hidden">
    <h2>시험 응시자 정보 입력</h2>
    <div class="input-group">
      <label>지역</label>
      <input type="text" id="region" placeholder="예: 2지역">
    </div>
    <div class="input-group">
      <label>부서/과</label>
      <input type="text" id="department" placeholder="예: 청년회, 학생회">
    </div>
    <div class="input-group">
      <label>구역</label>
      <input type="text" id="district" placeholder="예: 2구역, 문화과, 교육과">
    </div>
    <div class="input-group">
      <label>성함</label>
      <input type="text" id="name" placeholder="예: 홍길동">
    </div>
    <div class="input-group">
      <label>응시 난이도</label>
      <select id="difficulty">
        <option value="초급">초급 (빈칸 위주 + 서술형 조금)</option>
        <option value="중급">중급 (빈칸 반 + 서술형 반)</option>
        <option value="고급">고급 (100% 전체 서술형)</option>
      </select>
    </div>
    <button onclick="window.startExam()">응시하기</button>
  </div>

  <!-- 2. 시험 응시 화면 -->
  <div id="exam-screen" class="hidden">
    <h2 id="exam-title">계시록 시험</h2>
    <p id="user-info-display" style="text-align: right; color: #666; font-size: 14px; font-weight: bold;"></p>
    <div style="text-align: right; font-size: 13px; color: #999; margin-bottom: 10px;">
      난이도: <span id="diff-display"></span> | 배점: 빈칸 <span id="pt-blank"></span>점, 서술 <span id="pt-essay"></span>점
    </div>
    <hr style="border: 0; height: 1px; background: #ddd; margin-bottom: 20px;">
    
    <form id="exam-form">
      <div id="question-container"></div>
      <button type="button" onclick="window.submitExam()" style="margin-top: 20px; font-size: 18px;">답안 제출하기</button>
    </form>
  </div>

  <!-- 3. 결과 확인 화면 -->
  <div id="result-screen" class="hidden">
    <h2>채점 결과</h2>
    <div style="background:#e8f5e9; padding:20px; border-radius:10px; text-align:center; margin-bottom:20px; border:2px solid #4CAF50;">
      <h3 style="margin:0; color:#2e7d32;">최종 점수: <span id="final-score-display" style="font-size:30px;">0</span> 점</h3>
      <p style="margin:10px 0 0 0; color:#555; font-size:14px;">본인 점수가 마음에 들지 않으면 재시험도 가능합니다!</p>
    </div>
    
    <div id="result-container"></div>
    
    <div style="display: flex; gap: 10px; margin-top: 30px;">
      <button onclick="window.retakeExam()">재시험 응시하기</button>
      <button onclick="location.reload()" class="btn-secondary">나가기 (처음으로)</button>
    </div>
  </div>

  <!-- 4. 관리자 화면 -->
  <div id="admin-screen" class="hidden">
    <h2>관리자 모드</h2>
    <div class="admin-tabs">
      <div class="admin-tab active" onclick="window.switchAdminTab('settings')">시험 설정</div>
      <div class="admin-tab" onclick="window.switchAdminTab('blanks')">수동 빈칸 관리</div>
      <div class="admin-tab" onclick="window.switchAdminTab('status')">응시 현황</div>
    </div>

    <!-- 4-1. 설정 탭 -->
    <div id="admin-settings">
      <div class="settings-group">
        <label>시험 응시 상태</label>
        <select id="set-isopen" style="width:100%; padding:8px;">
          <option value="true">오픈 (응시 가능)</option>
          <option value="false">마감 (응시 불가)</option>
        </select>
      </div>

      <div class="settings-group">
        <label>출제 범위 (계시록)</label>
        <div style="display: flex; gap: 10px; align-items: center; margin-top:5px;">
          <input type="number" id="set-start" min="1" max="22" style="width: 80px;"> 장 ~
          <input type="number" id="set-end" min="1" max="22" style="width: 80px;"> 장
        </div>
      </div>

      <div class="settings-group">
        <label>난이도별 문항 수 설정</label>
        <table style="margin-top:10px;">
          <tr><th>난이도</th><th>빈칸 문항</th><th>서술 문항</th></tr>
          <tr><td>초급</td>
              <td><input type="number" id="set-low-blank" style="width:50px;"> 개</td>
              <td><input type="number" id="set-low-essay" style="width:50px;"> 개</td></tr>
          <tr><td>중급</td>
              <td><input type="number" id="set-mid-blank" style="width:50px;"> 개</td>
              <td><input type="number" id="set-mid-essay" style="width:50px;"> 개</td></tr>
          <tr><td>고급</td>
              <td>0 개</td>
              <td><input type="number" id="set-high-essay" style="width:50px;"> 개</td></tr>
        </table>
      </div>

      <div class="settings-group">
        <label>배점 설정</label>
        <div style="margin-top:5px;">
          빈칸 (1개당): <input type="number" id="set-pt-blank" style="width: 60px;"> 점<br><br>
          서술형 (1문제당): <input type="number" id="set-pt-essay" style="width: 60px;"> 점
        </div>
      </div>

      <div class="settings-group">
        <label>빈칸 출제 방식</label>
        <select id="set-blank-mode" style="width:100%; padding:8px; margin-top:5px;">
          <option value="random">랜덤 뚫기 (시스템 자동)</option>
          <option value="manual">관리자 수동 지정 (수동 빈칸 관리 탭 데이터 연동)</option>
        </select>
      </div>

      <button onclick="window.saveSettings()">설정 저장 및 적용</button>
      <button class="btn-secondary" onclick="location.reload()">나가기</button>
    </div>

    <!-- 4-2. 수동 빈칸 탭 -->
    <div id="admin-blanks" class="hidden">
      <div class="settings-group">
        <label>해당 장과 절을 선택하세요.</label>
        <div style="display:flex; gap:10px; margin-top:5px; margin-bottom:15px;">
          <select id="blank-ch" style="flex:1;" onchange="window.updateVerseSelect()"></select>
          <select id="blank-vs" style="flex:1;" onchange="window.renderVersePreview()"></select>
        </div>
        
        <label>본문 미리보기 (드래그하여 선택하세요)</label>
        <div id="verse-preview"></div>
        
        <div style="display:flex; gap:10px;">
          <button onclick="window.addManualBlank()">블록(드래그) 영역 빈칸 지정</button>
          <button onclick="window.clearManualBlank()" style="background-color:#e91e63;">현재 절 빈칸 초기화</button>
        </div>
      </div>
      <button onclick="window.saveManualBlanksDB()">DB에 빈칸 리스트 덮어쓰기 저장</button>
      <p style="color:#d32f2f; font-size:12px; text-align:center;">※ 작업 완료 후 반드시 저장 버튼을 눌러야 반영됩니다.</p>
    </div>

    <!-- 4-3. 현황 탭 -->
    <div id="admin-status" class="hidden">
      <div style="overflow-x: auto;">
        <table>
          <thead><tr><th>부서/과</th><th>구역</th><th>성함</th><th>난이도</th><th>점수</th></tr></thead>
          <tbody id="admin-table-body">
            <tr><td colspan="5">데이터를 불러오는 중입니다...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <button class="admin-trigger" onclick="window.checkAdmin()" title="관리자 로그인"></button>
</div>

<!-- Firebase SDK Modules -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  
  // 외부 파일에서 성경 데이터 불러오기
  import { bibleData } from "./data/bibleData.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD90YkT77h64XOfz2U96G9S7Csd0OhEVvk",
    authDomain: "cheongosi.firebaseapp.com",
    projectId: "cheongosi",
    storageBucket: "cheongosi.firebasestorage.app",
    messagingSenderId: "73793345931",
    appId: "1:73793345931:web:1944def28525c24bc2b78e",
    measurementId: "G-8QE5EB9VHN"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let examSettings = {
    isOpen: true,
    startCh: 7, endCh: 12,
    lowBlankCnt: 8, lowEssayCnt: 2,   // 초급
    midBlankCnt: 5, midEssayCnt: 5,   // 중급
    highEssayCnt: 10,                 // 고급
    ptBlank: 2, ptEssay: 10,
    blankMode: 'random'
  };

  let customBlanksDB = {}; // 관리자가 지정한 빈칸 리스트 보관
  let currentUser = {};

  // 초기 로딩
  window.onload = async function() {
    try {
      // 1. 시험 설정 불러오기
      const confSnap = await getDoc(doc(db, "settings", "examConfig"));
      if (confSnap.exists()) {
        examSettings = { ...examSettings, ...confSnap.data() };
      }
      
      // 2. 수동 빈칸 DB 불러오기
      const blanksSnap = await getDoc(doc(db, "settings", "manualBlanks"));
      if (blanksSnap.exists()) {
        customBlanksDB = blanksSnap.data();
      }
    } catch (e) {
      console.error("DB 로드 실패:", e);
    }

    document.getElementById('loading-screen').classList.add('hidden');

    if (examSettings.isOpen) {
      document.getElementById('login-screen').classList.remove('hidden');
    } else {
      document.getElementById('closed-screen').classList.remove('hidden');
    }
  };

  // ==========================================
  // 시험 관련 로직
  // ==========================================
  window.startExam = function() {
    const region = document.getElementById('region').value.trim();
    const dept = document.getElementById('department').value.trim();
    const district = document.getElementById('district').value.trim();
    const name = document.getElementById('name').value.trim();
    const difficulty = document.getElementById('difficulty').value;

    // 관리자 모드 진입 조건 (모두 49)
    if (region === "49" && dept === "49" && district === "49" && name === "49") {
      window.enterAdminMode();
      return;
    }

    if (!region || !dept || !district || !name) {
      alert("모든 정보를 입력해주세요.");
      return;
    }

    currentUser = { region, department: dept, district, name, difficulty };

    document.getElementById('user-info-display').innerText = 
      `${region} / ${dept} / ${district} / ${name} 응시자님 환영합니다.`;
    document.getElementById('diff-display').innerText = difficulty;
    document.getElementById('pt-blank').innerText = examSettings.ptBlank;
    document.getElementById('pt-essay').innerText = examSettings.ptEssay;

    generateQuestions(difficulty);

    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('exam-screen').classList.remove('hidden');
  }

  window.retakeExam = function() {
    document.getElementById('result-screen').classList.add('hidden');
    
    // 이전에 생성했던 문제 화면 초기화 및 재출제
    document.getElementById('question-container').innerHTML = '';
    generateQuestions(currentUser.difficulty);
    
    document.getElementById('exam-screen').classList.remove('hidden');
    window.scrollTo(0, 0);
  }

  function generateQuestions(difficulty) {
    const container = document.getElementById('question-container');
    container.innerHTML = '';

    let pool = [];
    for (let ch = examSettings.startCh; ch <= examSettings.endCh; ch++) {
      if(bibleData[ch]) {
        bibleData[ch].forEach((text, index) => {
          pool.push({ ch: ch, verse: index + 1, text: text });
        });
      }
    }

    // 배열 섞기
    pool.sort(() => Math.random() - 0.5);

    let numBlank = 0, numEssay = 0;
    if (difficulty === '초급') {
      numBlank = examSettings.lowBlankCnt;
      numEssay = examSettings.lowEssayCnt;
    } else if (difficulty === '중급') {
      numBlank = examSettings.midBlankCnt;
      numEssay = examSettings.midEssayCnt;
    } else if (difficulty === '고급') {
      numBlank = 0;
      numEssay = examSettings.highEssayCnt;
    }

    let totalNeeded = numBlank + numEssay;
    let selectedVerses = pool.slice(0, totalNeeded);
    
    let qIndex = 1;

    selectedVerses.forEach((verseInfo, i) => {
      // 지정된 numBlank 수량만큼 먼저 빈칸 문제 배정, 나머지는 서술형
      let isBlankType = i < numBlank;

      const qBox = document.createElement('div');
      qBox.className = 'question-box';
      
      const qTitle = document.createElement('div');
      qTitle.className = 'question-title';
      qTitle.innerText = `${qIndex}. 계시록 ${verseInfo.ch}장 ${verseInfo.verse}절`;
      qBox.appendChild(qTitle);

      if (isBlankType) {
        let htmlText = verseInfo.text;
        
        if (examSettings.blankMode === 'manual' && customBlanksDB[`${verseInfo.ch}:${verseInfo.verse}`]) {
          let wordsToBlank = customBlanksDB[`${verseInfo.ch}:${verseInfo.verse}`];
          // 긴 단어부터 치환하여 겹침 방지
          wordsToBlank.sort((a,b) => b.length - a.length);
          wordsToBlank.forEach(word => {
            htmlText = htmlText.replaceAll(word, `<input type="text" class="blank-input answer-field" data-answer="${word}">`);
          });
        } else {
          // 자동 랜덤
          let words = htmlText.split(' ');
          let blankCount = Math.max(1, Math.floor(words.length * 0.25)); 
          let blankIndices = [];
          while (blankIndices.length < blankCount && blankIndices.length < words.length) {
            let r = Math.floor(Math.random() * words.length);
            if (!blankIndices.includes(r) && words[r].length > 1) {
              blankIndices.push(r);
            }
          }
          blankIndices.forEach(idx => {
            words[idx] = `<input type="text" class="blank-input answer-field" data-answer="${words[idx]}">`;
          });
          htmlText = words.join(' ');
        }
        
        const qContent = document.createElement('p');
        qContent.style.margin = "0";
        qContent.innerHTML = htmlText;
        qBox.appendChild(qContent);

      } else {
        const qDesc = document.createElement('p');
        qDesc.style.margin = "0 0 10px 0";
        qDesc.innerText = "위 구절의 전체 말씀을 정확히 기록하시오.";
        const textArea = document.createElement('textarea');
        textArea.className = "answer-field";
        textArea.setAttribute('data-answer', verseInfo.text);
        qBox.appendChild(qDesc);
        qBox.appendChild(textArea);
      }

      container.appendChild(qBox);
      qIndex++;
    });
  }

  function normalizeText(text) {
    return text.replace(/[\s\.\,\?\!\'\"]/g, '');
  }

  window.submitExam = async function() {
    if(!confirm("답안을 제출하시겠습니까? 제출 후 채점 결과가 바로 표시됩니다.")) return;

    // 결과 화면 그리기 위해 문제 박스들 복사
    const resContainer = document.getElementById('result-container');
    resContainer.innerHTML = document.getElementById('question-container').innerHTML;
    
    let finalScore = 0;
    const resFields = resContainer.querySelectorAll('.answer-field');
    const originalFields = document.querySelectorAll('#question-container .answer-field');

    resFields.forEach((field, idx) => {
      // 복사된 컨테이너에는 입력값이 복사되지 않으므로 수동 매핑
      field.value = originalFields[idx].value;
      field.disabled = true; // 수정 불가 처리

      const userAnswer = normalizeText(field.value || "");
      const correctAnswer = normalizeText(field.getAttribute('data-answer') || "");
      const isCorrect = (userAnswer === correctAnswer) && (userAnswer !== "");

      if (isCorrect) {
        field.classList.add('correct-field');
        finalScore += (field.tagName === 'INPUT' ? examSettings.ptBlank : examSettings.ptEssay);
      } else {
        field.classList.add('wrong-field');
        
        // 오답 시 정답을 빨간 글씨로 옆(또는 아래)에 표시
        const ansLabel = document.createElement('span');
        ansLabel.className = 'correct-label';
        ansLabel.innerText = `정답: ${field.getAttribute('data-answer')}`;
        
        if (field.tagName === 'INPUT') {
          field.parentNode.insertBefore(ansLabel, field.nextSibling);
        } else {
          // 서술형인 경우 밑에 블록으로 표시
          ansLabel.style.display = 'block';
          ansLabel.style.marginTop = '10px';
          field.parentNode.appendChild(ansLabel);
        }
      }
    });

    document.getElementById('final-score-display').innerText = finalScore;

    // Firebase에 저장
    try {
      await addDoc(collection(db, "examResults"), {
        region: currentUser.region,
        department: currentUser.department,
        district: currentUser.district,
        name: currentUser.name,
        difficulty: currentUser.difficulty,
        score: finalScore,
        timestamp: new Date()
      });
    } catch (e) {
      console.error("결과 DB 저장 에러:", e);
    }

    // 뷰 전환
    document.getElementById('exam-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    window.scrollTo(0, 0);
  }

  // ==========================================
  // 관리자 모드 로직
  // ==========================================
  window.enterAdminMode = function() {
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('closed-screen').classList.add('hidden');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('exam-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.add('hidden');
    document.getElementById('admin-screen').classList.remove('hidden');
    
    // 설정값 바인딩
    document.getElementById('set-isopen').value = examSettings.isOpen.toString();
    document.getElementById('set-start').value = examSettings.startCh;
    document.getElementById('set-end').value = examSettings.endCh;
    
    document.getElementById('set-low-blank').value = examSettings.lowBlankCnt;
    document.getElementById('set-low-essay').value = examSettings.lowEssayCnt;
    document.getElementById('set-mid-blank').value = examSettings.midBlankCnt;
    document.getElementById('set-mid-essay').value = examSettings.midEssayCnt;
    document.getElementById('set-high-essay').value = examSettings.highEssayCnt;
    
    document.getElementById('set-pt-blank').value = examSettings.ptBlank;
    document.getElementById('set-pt-essay').value = examSettings.ptEssay;
    document.getElementById('set-blank-mode').value = examSettings.blankMode;
    
    initManualBlanksUI();
  }

  window.checkAdmin = function() {
    const pw = prompt("관리자 비밀번호를 입력하세요 (기본: 1234)");
    if (pw === "1234") {
      window.enterAdminMode();
    } else if (pw !== null) {
      alert("비밀번호가 틀렸습니다.");
    }
  }

  window.switchAdminTab = async function(tab) {
    document.querySelectorAll('.admin-tab').forEach(el => el.classList.remove('active'));
    document.getElementById('admin-settings').classList.add('hidden');
    document.getElementById('admin-blanks').classList.add('hidden');
    document.getElementById('admin-status').classList.add('hidden');

    if (tab === 'settings') {
      document.querySelectorAll('.admin-tab')[0].classList.add('active');
      document.getElementById('admin-settings').classList.remove('hidden');
    } else if (tab === 'blanks') {
      document.querySelectorAll('.admin-tab')[1].classList.add('active');
      document.getElementById('admin-blanks').classList.remove('hidden');
    } else {
      document.querySelectorAll('.admin-tab')[2].classList.add('active');
      document.getElementById('admin-status').classList.remove('hidden');
      await loadAdminStatus();
    }
  }

  // --- 수동 빈칸 툴 로직 ---
  function initManualBlanksUI() {
    const chSelect = document.getElementById('blank-ch');
    chSelect.innerHTML = '';
    for (let ch = examSettings.startCh; ch <= examSettings.endCh; ch++) {
      if(bibleData[ch]) chSelect.innerHTML += `<option value="${ch}">${ch}장</option>`;
    }
    window.updateVerseSelect();
  }

  window.updateVerseSelect = function() {
    const ch = document.getElementById('blank-ch').value;
    const vsSelect = document.getElementById('blank-vs');
    vsSelect.innerHTML = '';
    if (bibleData[ch]) {
      bibleData[ch].forEach((v, idx) => {
        vsSelect.innerHTML += `<option value="${idx+1}">${idx+1}절</option>`;
      });
    }
    window.renderVersePreview();
  }

  window.renderVersePreview = function() {
    const ch = document.getElementById('blank-ch').value;
    const vs = document.getElementById('blank-vs').value;
    const key = `${ch}:${vs}`;
    
    if(!bibleData[ch] || !bibleData[ch][vs-1]) return;
    
    let htmlText = bibleData[ch][vs-1];
    
    // DB에 있는 단어를 노란색 mark로 하이라이트
    if(customBlanksDB[key]) {
      let words = [...customBlanksDB[key]];
      words.sort((a,b) => b.length - a.length); // 긴 단어부터 치환
      words.forEach(w => {
        htmlText = htmlText.replaceAll(w, `<mark>${w}</mark>`);
      });
    }
    
    document.getElementById('verse-preview').innerHTML = htmlText;
  }

  window.addManualBlank = function() {
    const sel = window.getSelection().toString().trim();
    if (!sel) {
      alert("먼저 위의 미리보기 상자에서 빈칸으로 뚫을 단어를 마우스로 드래그하여 블록 지정하세요.");
      return;
    }

    const ch = document.getElementById('blank-ch').value;
    const vs = document.getElementById('blank-vs').value;
    const key = `${ch}:${vs}`;

    if(!customBlanksDB[key]) customBlanksDB[key] = [];
    if(!customBlanksDB[key].includes(sel)) {
      customBlanksDB[key].push(sel);
      window.getSelection().removeAllRanges(); // 드래그 해제
      window.renderVersePreview();
    }
  }

  window.clearManualBlank = function() {
    const ch = document.getElementById('blank-ch').value;
    const vs = document.getElementById('blank-vs').value;
    const key = `${ch}:${vs}`;
    
    if(confirm(`${ch}장 ${vs}절에 지정된 빈칸을 모두 지우시겠습니까?`)) {
      delete customBlanksDB[key];
      window.renderVersePreview();
    }
  }

  window.saveManualBlanksDB = async function() {
    try {
      await setDoc(doc(db, "settings", "manualBlanks"), customBlanksDB);
      alert("수동 빈칸 데이터가 안전하게 DB에 저장되었습니다!");
    } catch (e) {
      console.error("수동 빈칸 저장 실패:", e);
      alert("저장 실패. 관리자에게 문의하세요.");
    }
  }

  // --- 응시 현황 통계 ---
  async function loadAdminStatus() {
    const tbody = document.getElementById('admin-table-body');
    tbody.innerHTML = '<tr><td colspan="5">데이터를 불러오는 중입니다...</td></tr>';

    try {
      const querySnapshot = await getDocs(collection(db, "examResults"));
      const userMap = {};

      querySnapshot.forEach((doc) => {
        const data = doc.data();
        const key = `${data.region}_${data.department}_${data.district}_${data.name}_${data.difficulty}`;
        
        if (!userMap[key]) {
          userMap[key] = { ...data, scores: [data.score], count: 1 };
        } else {
          userMap[key].scores.push(data.score);
          userMap[key].count++;
        }
      });

      const userList = Object.values(userMap);
      userList.sort((a, b) => {
        if (a.region < b.region) return -1;
        if (a.region > b.region) return 1;
        if (a.name < b.name) return -1;
        if (a.name > b.name) return 1;
        return 0;
      });

      tbody.innerHTML = '';
      if(userList.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5">응시 기록이 없습니다.</td></tr>';
        return;
      }

      userList.forEach(u => {
        u.scores.sort((a, b) => b - a); // 내림차순 정렬
        const scoreString = u.scores.join(', ');
        const displayName = u.count > 1 ? `(재) ${u.name}` : u.name;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${u.department}</td>
          <td>${u.region} / ${u.district}</td>
          <td style="font-weight:bold;">${displayName}</td>
          <td>${u.difficulty}</td>
          <td style="color:#e91e63; font-weight:bold;">${scoreString}</td>
        `;
        tbody.appendChild(tr);
      });
    } catch (e) {
      console.error("데이터 로드 실패:", e);
      tbody.innerHTML = '<tr><td colspan="5">데이터를 불러오는 데 실패했습니다.</td></tr>';
    }
  }

  window.saveSettings = async function() {
    examSettings.isOpen = document.getElementById('set-isopen').value === 'true';
    examSettings.startCh = parseInt(document.getElementById('set-start').value);
    examSettings.endCh = parseInt(document.getElementById('set-end').value);
    
    examSettings.lowBlankCnt = parseInt(document.getElementById('set-low-blank').value);
    examSettings.lowEssayCnt = parseInt(document.getElementById('set-low-essay').value);
    examSettings.midBlankCnt = parseInt(document.getElementById('set-mid-blank').value);
    examSettings.midEssayCnt = parseInt(document.getElementById('set-mid-essay').value);
    examSettings.highEssayCnt = parseInt(document.getElementById('set-high-essay').value);
    
    examSettings.ptBlank = parseInt(document.getElementById('set-pt-blank').value);
    examSettings.ptEssay = parseInt(document.getElementById('set-pt-essay').value);
    examSettings.blankMode = document.getElementById('set-blank-mode').value;

    try {
      await setDoc(doc(db, "settings", "examConfig"), examSettings);
      alert("설정이 저장되었습니다.\n적용을 위해 화면을 새로고침합니다.");
      location.reload();
    } catch (e) {
      console.error("설정 저장 실패:", e);
      alert("저장에 실패했습니다.");
    }
  }
</script>
