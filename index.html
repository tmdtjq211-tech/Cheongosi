<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계시록 시험</title>
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      background-color: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 650px;
      box-sizing: border-box;
      position: relative;
    }
    h2 {
      text-align: center;
      color: #333;
    }
    .input-group {
      margin-bottom: 15px;
    }
    .input-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    .input-group input, .input-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box;
      font-size: 15px;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }
    button:hover {
      background-color: #45a049;
    }
    .blank-input {
      width: 80px;
      border: none;
      border-bottom: 2px solid #e91e63;
      text-align: center;
      outline: none;
      font-size: 16px;
      background-color: transparent;
      color: #333;
      font-weight: bold;
      margin: 0 5px;
    }
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      resize: vertical;
      box-sizing: border-box;
      font-size: 15px;
      min-height: 80px;
    }
    .question-box {
      background-color: #f9f9f9;
      padding: 15px;
      margin-bottom: 20px;
      border-left: 4px solid #4CAF50;
      border-radius: 5px;
      line-height: 1.6;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }
    th {
      background-color: #f2f2f2;
    }
    .hidden {
      display: none !important;
    }
    .admin-tabs {
      display: flex;
      border-bottom: 2px solid #4CAF50;
      margin-bottom: 20px;
    }
    .admin-tab {
      padding: 10px 20px;
      cursor: pointer;
      background: #f2f2f2;
      border-radius: 5px 5px 0 0;
      margin-right: 5px;
    }
    .admin-tab.active {
      background: #4CAF50;
      color: white;
      font-weight: bold;
    }
    .settings-group {
      background: #fafafa;
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 15px;
      border: 1px solid #eee;
    }
    .closed-message {
      text-align: center;
      font-size: 20px;
      color: #d32f2f;
      font-weight: bold;
      padding: 40px 0;
    }
    /* 관리자 진입용 숨겨진 버튼 */
    .admin-trigger {
      position: absolute;
      bottom: -40px;
      right: 0;
      width: 30px;
      height: 30px;
      background: transparent;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- 0. 로딩 화면 -->
  <div id="loading-screen">
    <h2 style="text-align:center; padding: 40px 0;">데이터를 불러오는 중입니다...</h2>
  </div>

  <!-- 0. 마감 메시지 화면 -->
  <div id="closed-screen" class="hidden">
    <div class="closed-message">
      지금은 시험응시 시간이 아닙니다.
    </div>
  </div>

  <!-- 1. 로그인 화면 -->
  <div id="login-screen" class="hidden">
    <h2>시험 응시자 정보 입력</h2>
    <div class="input-group">
      <label>지역</label>
      <input type="text" id="region" placeholder="예: 2지역">
    </div>
    <div class="input-group">
      <label>부서/과</label>
      <input type="text" id="department" placeholder="예: 청년회, 학생회">
    </div>
    <div class="input-group">
      <label>구역</label>
      <input type="text" id="district" placeholder="예: 2구역, 문화과, 교육과">
    </div>
    <div class="input-group">
      <label>성함</label>
      <input type="text" id="name" placeholder="예: 홍길동">
    </div>
    <div class="input-group">
      <label>응시 난이도</label>
      <select id="difficulty">
        <option value="초급">초급 (100% 빈칸)</option>
        <option value="중급">중급 (빈칸 + 서술형 혼합)</option>
        <option value="고급">고급 (100% 서술형 통암기)</option>
      </select>
    </div>
    <button onclick="window.startExam()">응시하기</button>
  </div>

  <!-- 2. 시험 응시 화면 -->
  <div id="exam-screen" class="hidden">
    <h2 id="exam-title">계시록 시험</h2>
    <p id="user-info-display" style="text-align: right; color: #666; font-size: 14px; font-weight: bold;"></p>
    <div style="text-align: right; font-size: 12px; color: #999; margin-bottom: 10px;">
      난이도: <span id="diff-display"></span> | 배점: 빈칸 <span id="pt-blank"></span>점, 서술 <span id="pt-essay"></span>점
    </div>
    <hr style="border: 0; height: 1px; background: #eee; margin-bottom: 20px;">
    
    <form id="exam-form">
      <div id="question-container"></div>
      <button type="button" onclick="window.submitExam()">답안 제출하기</button>
    </form>
  </div>

  <!-- 3. 관리자 화면 -->
  <div id="admin-screen" class="hidden">
    <h2>관리자 모드</h2>
    <div class="admin-tabs">
      <div class="admin-tab active" onclick="window.switchAdminTab('settings')">시험 설정</div>
      <div class="admin-tab" onclick="window.switchAdminTab('status')">응시 현황</div>
    </div>

    <!-- 설정 탭 -->
    <div id="admin-settings">
      <div class="settings-group">
        <label style="font-weight: bold;">시험 응시 상태</label>
        <select id="set-isopen" style="width:100%; padding:8px; margin-top:5px;">
          <option value="true">오픈 (응시 가능)</option>
          <option value="false">마감 (응시 불가)</option>
        </select>
      </div>

      <div class="settings-group">
        <label style="font-weight: bold;">출제 범위 (계시록)</label>
        <div style="display: flex; gap: 10px; margin-top:5px; align-items: center;">
          <input type="number" id="set-start" min="1" max="22" style="width: 60px; padding: 5px;"> 장 ~
          <input type="number" id="set-end" min="1" max="22" style="width: 60px; padding: 5px;"> 장
        </div>
      </div>

      <div class="settings-group">
        <label style="font-weight: bold;">문제 수 설정</label>
        <div style="margin-top:10px; font-size: 14px;">
          초급/고급 총 문항: <input type="number" id="set-total" style="width: 60px; padding: 5px;"><br><br>
          중급 빈칸 문항: <input type="number" id="set-mid-blank" style="width: 60px; padding: 5px;"> 개<br><br>
          중급 서술 문항: <input type="number" id="set-mid-essay" style="width: 60px; padding: 5px;"> 개
        </div>
      </div>

      <div class="settings-group">
        <label style="font-weight: bold;">배점 설정</label>
        <div style="margin-top:10px; font-size: 14px;">
          빈칸 (1개당): <input type="number" id="set-pt-blank" style="width: 60px; padding: 5px;"> 점<br><br>
          서술형 (1문제당): <input type="number" id="set-pt-essay" style="width: 60px; padding: 5px;"> 점
        </div>
      </div>

      <div class="settings-group">
        <label style="font-weight: bold;">빈칸 출제 방식</label>
        <select id="set-blank-mode" style="width:100%; padding:8px; margin-top:5px;">
          <option value="random">랜덤 뚫기 (시스템 자동)</option>
          <option value="manual">관리자 수동 지정 (DB 연동 시 사용)</option>
        </select>
      </div>

      <button onclick="window.saveSettings()">설정 저장 및 적용</button>
      <button style="background-color: #f44336;" onclick="location.reload()">나가기</button>
    </div>

    <!-- 현황 탭 -->
    <div id="admin-status" class="hidden">
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>부서/과</th><th>구역</th><th>성함</th><th>난이도</th><th>점수</th>
            </tr>
          </thead>
          <tbody id="admin-table-body">
            <tr>
              <td colspan="5">데이터를 불러오는 중입니다...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 관리자 로그인 트리거 버튼 (화면 밖 투명 버튼) -->
  <button class="admin-trigger" onclick="window.checkAdmin()" title="관리자 로그인"></button>
</div>

    12: ["하늘에 큰 이적이 보이니 해를 입은 한 여자가 있는데 그 발 아래는 달이 있고 그 머리에는 열 두 별의 면류관을 썼더라", "이 여자가 아이를 배어 해산하게 되매 아파서 애를 쓰며 부르짖더라", "하늘에 또 다른 이적이 보이니 보라 한 큰 붉은 용이 있어 머리가 일곱이요 뿔이 열이라 그 여러 머리에 일곱 면류관이 있는데", "그 꼬리가 하늘 별 삼분의 일을 끌어다가 땅에 던지더라 용이 해산하려는 여자 앞에서 그가 해산하면 그 아이를 삼키고자 하더니", "여자가 아들을 낳으니 이는 장차 철장으로 만국을 다스릴 남자라 그 아이를 하나님 앞과 그 보좌 앞으로 올려가더라", "그 여자가 광야로 도망하매 거기서 일천 이백 육십일 동안 저를 양육하기 위하여 하나님의 예비하신 곳이 있더라", "하늘에 전쟁이 있으니 미가엘과 그의 사자들이 용으로 더불어 싸울쌔 용과 그의 사자들도 싸우나", "이기지 못하여 다시 하늘에서 저희의 있을 곳을 얻지 못한지라", "큰 용이 내어 쫓기니 옛 뱀 곧 마귀라고도 하고 사단이라고도 하는 온 천하를 꾀는 자라 땅으로 내어 쫓기니 그의 사자들도 저와 함께 내어 쫓기니라", "내가 또 들으니 하늘에 큰 음성이 있어 가로되 이제 우리 하나님의 구원과 능력과 나라와 또 그의 그리스도의 권세가 이루었으니 우리 형제들을 참소하던 자 곧 우리 하나님 앞에서 밤낮 참소하던 자가 쫓겨 났고", "또 여러 형제가 어린 양의 피와 자기의 증거하는 말을 인하여 저를 이기었으니 그들은 죽기까지 자기 생명을 아끼지 아니하였도다", "그러므로 하늘과 그 가운데 거하는 자들은 즐거워하라 그러나 땅과 바다는 화 있을찐저 이는 마귀가 자기의 때가 얼마 못된 줄을 알므로 크게 분내어 너희에게 내려 갔음이라 하더라", "용이 자기가 땅으로 내어 쫓긴 것을 보고 남자를 낳은 여자를 핍박하는지라", "그 여자가 큰 독수리의 두 날개를 받아 광야 자기 곳으로 날아가 거기서 그 뱀의 낯을 피하여 한 때와 두 때와 반 때를 양육 받으매", "여자의 뒤에서 뱀이 그 입으로 물을 강 같이 토하여 여자를 물에 떠내려 가게 하려 하되", "땅이 여자를 도와 그 입을 벌려 용의 입에서 토한 강물을 삼키니", "용이 여자에게 분노하여 돌아가서 그 여자의 남은 자손 곧 하나님의 계명을 지키며 예수의 증거를 가진 자들로 더불어 싸우려고 바다 모래 위에 섰더라"]

      return;
    }

    document.getElementById('user-info-display').innerText = 
      `${region} / ${dept} / ${district} / ${name} 응시자님 환영합니다.`;
    document.getElementById('diff-display').innerText = difficulty;
    document.getElementById('pt-blank').innerText = examSettings.ptBlank;
    document.getElementById('pt-essay').innerText = examSettings.ptEssay;

    generateQuestions(difficulty);

    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('exam-screen').classList.remove('hidden');
  }

  function generateQuestions(difficulty) {
    const container = document.getElementById('question-container');
    container.innerHTML = '';

    let pool = [];
    for (let ch = examSettings.startCh; ch <= examSettings.endCh; ch++) {
      if(bibleData[ch]) {
        bibleData[ch].forEach((text, index) => {
          pool.push({ ch: ch, verse: index + 1, text: text });
        });
      }
    }

    pool.sort(() => Math.random() - 0.5);

    let numBlank = 0;
    let numEssay = 0;

    if (difficulty === '초급') {
      numBlank = examSettings.totalQuestions;
      numEssay = 0;
    } else if (difficulty === '중급') {
      numBlank = examSettings.midBlankCnt;
      numEssay = examSettings.midEssayCnt;
    } else if (difficulty === '고급') {
      numBlank = 0;
      numEssay = examSettings.totalQuestions;
    }

    let totalNeeded = difficulty === '중급' ? (examSettings.midBlankCnt + examSettings.midEssayCnt) : examSettings.totalQuestions;
    let selectedVerses = pool.slice(0, totalNeeded);
    
    let qIndex = 1;

    selectedVerses.forEach((verseInfo, i) => {
      let isBlankType = false;
      if (difficulty === '초급') isBlankType = true;
      if (difficulty === '고급') isBlankType = false;
      if (difficulty === '중급') {
        isBlankType = i < examSettings.midBlankCnt;
      }

      const qBox = document.createElement('div');
      qBox.className = 'question-box';
      
      const qTitle = document.createElement('h3');
      qTitle.innerText = `${qIndex}. 계시록 ${verseInfo.ch}장 ${verseInfo.verse}절`;
      qBox.appendChild(qTitle);

      if (isBlankType) {
        let htmlText = verseInfo.text;
        
        if (examSettings.blankMode === 'manual' && manualBlanksDB[`${verseInfo.ch}:${verseInfo.verse}`]) {
          let wordsToBlank = manualBlanksDB[`${verseInfo.ch}:${verseInfo.verse}`];
          wordsToBlank.forEach(word => {
            htmlText = htmlText.replace(word, `<input type="text" class="blank-input answer-field" data-answer="${word}">`);
          });
        } else {
          let words = htmlText.split(' ');
          let blankCount = Math.max(1, Math.floor(words.length * 0.2)); 
          let blankIndices = [];
          while (blankIndices.length < blankCount) {
            let r = Math.floor(Math.random() * words.length);
            if (!blankIndices.includes(r) && words[r].length > 1) {
              blankIndices.push(r);
            }
          }
          blankIndices.forEach(idx => {
            let originalWord = words[idx];
            words[idx] = `<input type="text" class="blank-input answer-field" data-answer="${originalWord}">`;
          });
          htmlText = words.join(' ');
        }
        
        const qContent = document.createElement('p');
        qContent.innerHTML = htmlText;
        qBox.appendChild(qContent);

      } else {
        const qDesc = document.createElement('p');
        qDesc.innerText = "위 구절의 전체 말씀을 정확히 기록하시오.";
        const textArea = document.createElement('textarea');
        textArea.className = "answer-field";
        textArea.setAttribute('data-answer', verseInfo.text);
        qBox.appendChild(qDesc);
        qBox.appendChild(textArea);
      }

      container.appendChild(qBox);
      qIndex++;
    });
  }

  // 텍스트 비교를 위한 정규화 (띄어쓰기, 문장부호 제거)
  function normalizeText(text) {
    return text.replace(/[\s\.\,\?\!\'\"]/g, '');
  }

  // 자동 채점 및 제출
  window.submitExam = async function() {
    if(confirm("답안을 제출하시겠습니까?")) {
      let finalScore = 0;
      const answerFields = document.querySelectorAll('.answer-field');

      answerFields.forEach(field => {
        const userAnswer = normalizeText(field.value || "");
        const correctAnswer = normalizeText(field.getAttribute('data-answer') || "");

        if (userAnswer === correctAnswer && userAnswer !== "") {
          if (field.tagName === 'INPUT') {
            finalScore += examSettings.ptBlank;
          } else if (field.tagName === 'TEXTAREA') {
            finalScore += examSettings.ptEssay;
          }
        }
      });

      // Firebase에 결과 저장
      try {
        await addDoc(collection(db, "examResults"), {
          region: currentUser.region,
          department: currentUser.department,
          district: currentUser.district,
          name: currentUser.name,
          difficulty: currentUser.difficulty,
          score: finalScore,
          timestamp: new Date()
        });
      } catch (e) {
        console.error("저장 에러:", e);
      }

      // 결과 알림 및 재시험 안내
      alert(`제출이 완료되었습니다!\n\n${currentUser.name}님의 점수: ${finalScore}점\n\n본인 점수가 마음에 들지 않으면 재시험도 가능합니다!`);
      location.reload();
    }
  }

  // ==========================================
  // 관리자 모드 로직
  // ==========================================
  window.enterAdminMode = function() {
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('closed-screen').classList.add('hidden');
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('exam-screen').classList.add('hidden');
    document.getElementById('admin-screen').classList.remove('hidden');
    
    document.getElementById('set-isopen').value = examSettings.isOpen.toString();
    document.getElementById('set-start').value = examSettings.startCh;
    document.getElementById('set-end').value = examSettings.endCh;
    document.getElementById('set-total').value = examSettings.totalQuestions;
    document.getElementById('set-mid-blank').value = examSettings.midBlankCnt;
    document.getElementById('set-mid-essay').value = examSettings.midEssayCnt;
    document.getElementById('set-pt-blank').value = examSettings.ptBlank;
    document.getElementById('set-pt-essay').value = examSettings.ptEssay;
    document.getElementById('set-blank-mode').value = examSettings.blankMode;
  }

  window.checkAdmin = function() {
    const pw = prompt("관리자 비밀번호를 입력하세요 (기본: 1234)");
    if (pw === "1234") {
      window.enterAdminMode();
    } else if (pw !== null) {
      alert("비밀번호가 틀렸습니다.");
    }
  }

  window.switchAdminTab = async function(tab) {
    document.querySelectorAll('.admin-tab').forEach(el => el.classList.remove('active'));
    document.getElementById('admin-settings').classList.add('hidden');
    document.getElementById('admin-status').classList.add('hidden');

    if (tab === 'settings') {
      document.querySelectorAll('.admin-tab')[0].classList.add('active');
      document.getElementById('admin-settings').classList.remove('hidden');
    } else {
      document.querySelectorAll('.admin-tab')[1].classList.add('active');
      document.getElementById('admin-status').classList.remove('hidden');
      await loadAdminStatus(); // 현황 불러오기
    }
  }

  // 현황 데이터 불러오기 및 정렬 (지역순 -> 가나다순)
  async function loadAdminStatus() {
    const tbody = document.getElementById('admin-table-body');
    tbody.innerHTML = '<tr><td colspan="5">데이터를 불러오는 중입니다...</td></tr>';

    try {
      const querySnapshot = await getDocs(collection(db, "examResults"));
      const userMap = {};

      querySnapshot.forEach((doc) => {
        const data = doc.data();
        // 고유 식별 키 생성
        const key = `${data.region}_${data.department}_${data.district}_${data.name}_${data.difficulty}`;
        
        if (!userMap[key]) {
          userMap[key] = { ...data, scores: [data.score], count: 1 };
        } else {
          userMap[key].scores.push(data.score);
          userMap[key].count++;
        }
      });

      const userList = Object.values(userMap);

      // 정렬 1순위: 지역순, 2순위: 성함(가나다순)
      userList.sort((a, b) => {
        if (a.region < b.region) return -1;
        if (a.region > b.region) return 1;
        if (a.name < b.name) return -1;
        if (a.name > b.name) return 1;
        return 0;
      });

      tbody.innerHTML = '';
      if(userList.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5">응시 기록이 없습니다.</td></tr>';
        return;
      }

      userList.forEach(u => {
        // 점수를 높은 순서대로 정렬
        u.scores.sort((a, b) => b - a);
        const scoreString = u.scores.join(', ');
        
        // 재시험자인 경우 이름 앞에 (재) 붙이기
        const displayName = u.count > 1 ? `(재) ${u.name}` : u.name;

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${u.department}</td>
          <td>${u.region} / ${u.district}</td>
          <td style="font-weight:bold;">${displayName}</td>
          <td>${u.difficulty}</td>
          <td style="color:#e91e63; font-weight:bold;">${scoreString}</td>
        `;
        tbody.appendChild(tr);
      });

    } catch (e) {
      console.error("데이터 로드 실패:", e);
      tbody.innerHTML = '<tr><td colspan="5">데이터를 불러오는 데 실패했습니다.</td></tr>';
    }
  }

  // 관리자 설정 저장
  window.saveSettings = async function() {
    examSettings.isOpen = document.getElementById('set-isopen').value === 'true';
    examSettings.startCh = parseInt(document.getElementById('set-start').value);
    examSettings.endCh = parseInt(document.getElementById('set-end').value);
    examSettings.totalQuestions = parseInt(document.getElementById('set-total').value);
    examSettings.midBlankCnt = parseInt(document.getElementById('set-mid-blank').value);
    examSettings.midEssayCnt = parseInt(document.getElementById('set-mid-essay').value);
    examSettings.ptBlank = parseInt(document.getElementById('set-pt-blank').value);
    examSettings.ptEssay = parseInt(document.getElementById('set-pt-essay').value);
    examSettings.blankMode = document.getElementById('set-blank-mode').value;

    try {
      await setDoc(doc(db, "settings", "examConfig"), examSettings);
      alert("설정이 저장되었습니다.\n적용을 위해 메인화면으로 돌아갑니다.");
      location.reload();
    } catch (e) {
      console.error("설정 저장 실패:", e);
      alert("저장에 실패했습니다. 관리자에게 문의하세요.");
    }
  }
</script>
